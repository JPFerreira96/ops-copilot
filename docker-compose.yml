services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: opscopilot
      POSTGRES_PASSWORD: opscopilot_password
      POSTGRES_DB: opscopilot_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://opscopilot:opscopilot_password@postgres:5432/opscopilot_db?schema=public
      - AUTH_TRUST_HOST=true
      - NEXTAUTH_SECRET=super_secret_fallback_key_for_ops_copilot
      - NEXTAUTH_URL=http://localhost:3000
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      - postgres
    command: >
      sh -c "./node_modules/.bin/prisma generate &&
             ./node_modules/.bin/prisma migrate deploy &&
             ./node_modules/.bin/prisma db seed && 
             node server.js"
    restart: always

volumes:
  postgres_data:
