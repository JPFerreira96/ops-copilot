services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: opscopilot
      POSTGRES_PASSWORD: opscopilot_password
      POSTGRES_DB: opscopilot_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:./prisma/dev.db
      - AUTH_SECRET=super_secret_fallback_key_for_ops_copilot
      - AUTH_TRUST_HOST=true
      - NEXTAUTH_SECRET=super_secret_fallback_key_for_ops_copilot
      - NEXTAUTH_URL=http://localhost:3000
      - GEMINI_API_KEY=AIzaSyBGVXOL-Nhq_YjnQPMTcvIYLNspJ3QcdPE
    depends_on:
      - postgres
    command: >
      sh -c "./node_modules/.bin/prisma db push && 
             ./node_modules/.bin/prisma db seed && 
             node server.js"
    restart: always

volumes:
  postgres_data:
