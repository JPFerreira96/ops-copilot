version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: opscopilot
      POSTGRES_PASSWORD: opscopilot_password
      POSTGRES_DB: opscopilot_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
